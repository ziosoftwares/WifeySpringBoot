spring:
  profiles:
    active: ${SPRING_ACTIVE_PROFILES}
  application:
    name: wifey
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  web:
    resources:
      add-mappings: false
  http:
    log-request-details=true:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      url: ${REDIS_URL}
  cache:
    type: redis
    redis.time-to-live: 3600000

server:
  port: 8001

ai:
  url: ${AI_URL}

s3:
  url: ${S3URL}
  bucket: ${S3BUCKET}
  keyid: ${S3KEYID}
  key: ${S3KEY}

content:
  recipe: "content/recipe"

logging:
  include-application-name: false
  level:
    org.springframework.security.web.util.matcher: TRACE
    org.springframework.security.web.FilterChainProxy: TRACE
    org.springframework.web.servlet.DispatcherServlet: TRACE
    org.springframework.web.servlet.handler.AbstractHandlerMapping: TRACE